name: Release library to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run lint --workspaces --if-present

      - run: npm run typecheck

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./packages/graffiti/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Clean and build library
        run: |
          rm -rf packages/graffiti/dist
          npm run build -w packages/graffiti

      - name: Publish to npm with provenance
        run: npm publish -w packages/graffiti --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
